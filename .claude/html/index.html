document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n:root {\n  /* ── Brand / primary ─────────────────────────────────────── */\n  --er-primary:        #00d4aa;   /* cyan-teal; action, focus, logo */\n  --er-primary-hi:     #00e6b8;   /* hover lighten */\n  --er-primary-lo:     #00b894;   /* gradient end on primary btn */\n\n  /* ── Semantic ───────────────────────────────────────────── */\n  --er-green:  #22c55e;   /* win / profit */\n  --er-amber:  #f59e0b;   /* warning / DRY_RUN */\n  --er-red:    #ef4444;   /* loss / LIVE / reject */\n\n  /* ── Surface ramp (dark navy) ───────────────────────────── */\n  --er-bg-deep:    #0a0e17;   /* canvas base, page gradient start */\n  --er-bg-canvas:  #0d1220;   /* page gradient end, input bg */\n  --er-surface-1:  #111827;   /* card / metric tile */\n  --er-surface-2:  #1e293b;   /* border / divider */\n  --er-surface-3:  #334155;   /* secondary-button border */\n\n  /* ── Text ramp ──────────────────────────────────────────── */\n  --er-text-1: #e2e8f0;   /* primary */\n  --er-text-2: #94a3b8;   /* secondary */\n  --er-text-3: #64748b;   /* tertiary / dim */\n  --er-text-4: #475569;   /* ghost / empty state */\n  --er-text-5: #334155;   /* near-invisible footer */\n\n  /* ── Tinted overlays (cyan) ─────────────────────────────── */\n  --er-tint-04:  rgba(0, 212, 170, 0.04);\n  --er-tint-06:  rgba(0, 212, 170, 0.06);\n  --er-tint-08:  rgba(0, 212, 170, 0.08);\n  --er-tint-12:  rgba(0, 212, 170, 0.12);\n  --er-tint-15:  rgba(0, 212, 170, 0.15);\n  --er-tint-25:  rgba(0, 212, 170, 0.25);\n  --er-tint-30:  rgba(0, 212, 170, 0.30);\n  --er-tint-40:  rgba(0, 212, 170, 0.40);\n  --er-glow:     0 0 20px rgba(0, 212, 170, 0.25);\n\n  /* ── Gradients ──────────────────────────────────────────── */\n  --er-grad-page:    linear-gradient(180deg, #0a0e17 0%, #0d1220 100%);\n  --er-grad-card:    linear-gradient(135deg, #111827 0%, #0d1220 100%);\n  --er-grad-primary: linear-gradient(135deg, #00d4aa 0%, #00b894 100%);\n  --er-grad-primary-hover: linear-gradient(135deg, #00e6b8 0%, #00d4aa 100%);\n  --er-grad-progress: linear-gradient(90deg, #22c55e 0%, #f59e0b 60%, #ef4444 100%);\n\n  /* ── Grid overlay ───────────────────────────────────────── */\n  --er-grid-size:  40px;\n  --er-grid-line:  rgba(0, 212, 170, 0.015);\n\n  /* ── Typography families ────────────────────────────────── */\n  --er-font-display: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;\n  --er-font-mono:    'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;\n\n  /* ── Type scale (rem) ───────────────────────────────────── */\n  --er-fs-h1:       1.75rem;    /* 28px  */\n  --er-fs-h2:       1.25rem;    /* 20px  */\n  --er-fs-h3:       1rem;       /* 16px  */\n  --er-fs-metric:   1.5rem;     /* 24px  */\n  --er-fs-body:     0.82rem;    /* ~13px */\n  --er-fs-label:    0.72rem;    /* ~11.5px */\n  --er-fs-section:  0.70rem;    /* ~11px */\n  --er-fs-caption:  0.65rem;    /* ~10.5px */\n  --er-fs-footer:   0.60rem;    /* ~9.5px */\n\n  /* ── Tracking ───────────────────────────────────────────── */\n  --er-ls-tight:  -0.02em;   /* display headings */\n  --er-ls-upper:   0.08em;   /* uppercase field labels */\n  --er-ls-wide:    0.10em;   /* section dividers */\n\n  /* ── Spacing (4/8 rhythm, observed) ─────────────────────── */\n  --er-sp-1: 4px;\n  --er-sp-2: 8px;\n  --er-sp-3: 12px;\n  --er-sp-4: 16px;\n  --er-sp-5: 20px;\n  --er-sp-6: 24px;\n  --er-sp-8: 32px;\n  --er-sp-10: 40px;\n\n  /* ── Radii ──────────────────────────────────────────────── */\n  --er-r-chip:   4px;\n  --er-r-ctrl:   6px;   /* buttons, inputs, alerts */\n  --er-r-card:   8px;   /* metric tiles, tables */\n\n  /* ── Borders ────────────────────────────────────────────── */\n  --er-b-default: 1px solid var(--er-surface-2);\n  --er-b-subtle:  1px solid var(--er-surface-3);\n  --er-b-active:  1px solid var(--er-primary);\n\n  /* ── Motion ─────────────────────────────────────────────── */\n  --er-dur-fast: 0.15s;\n  --er-dur-base: 0.20s;\n  --er-ease:     ease;\n\n  /* ── Layout ─────────────────────────────────────────────── */\n  --er-content-max: 1400px;\n}\n\n/* ================================================================\n   Semantic element styles — apply these via class or element\n   ================================================================ */\n\n.er-body {\n  background: var(--er-grad-page);\n  color: var(--er-text-1);\n  font-family: var(--er-font-mono);\n  font-size: var(--er-fs-body);\n  min-height: 100vh;\n}\n\n.er-body::before {\n  content: '';\n  position: fixed; inset: 0;\n  background-image:\n    linear-gradient(var(--er-grid-line) 1px, transparent 1px),\n    linear-gradient(90deg, var(--er-grid-line) 1px, transparent 1px);\n  background-size: var(--er-grid-size) var(--er-grid-size);\n  pointer-events: none;\n  z-index: 0;\n}\n\n.er-h1 {\n  font-family: var(--er-font-display);\n  font-weight: 600;\n  font-size: var(--er-fs-h1);\n  color: var(--er-primary);\n  letter-spacing: var(--er-ls-tight);\n  border-bottom: var(--er-b-default);\n  padding-bottom: 0.75rem;\n  margin: 0 0 1.5rem 0;\n}\n\n.er-h2 {\n  font-family: var(--er-font-display);\n  font-weight: 600;\n  font-size: var(--er-fs-h2);\n  color: var(--er-text-1);\n  letter-spacing: var(--er-ls-tight);\n  margin: 1.5rem 0 0.5rem 0;\n}\n\n.er-h3 {\n  font-family: var(--er-font-display);\n  font-weight: 500;\n  font-size: var(--er-fs-h3);\n  color: var(--er-text-2);\n  text-transform: uppercase;\n  letter-spacing: var(--er-ls-upper);\n  margin: 1rem 0 0.5rem 0;\n}\n\n.er-section-label {\n  font-family: var(--er-font-display);\n  font-weight: 500;\n  font-size: var(--er-fs-section);\n  color: var(--er-text-4);\n  text-transform: uppercase;\n  letter-spacing: var(--er-ls-wide);\n  border-bottom: var(--er-b-default);\n  padding-bottom: 0.4rem;\n  margin: 1.5rem 0 1rem 0;\n}\n\n.er-field-label {\n  font-family: var(--er-font-display);\n  font-weight: 500;\n  font-size: var(--er-fs-label);\n  color: var(--er-text-3);\n  text-transform: uppercase;\n  letter-spacing: var(--er-ls-upper);\n}\n\n.er-p {\n  font-family: var(--er-font-mono);\n  font-size: var(--er-fs-body);\n  color: var(--er-text-1);\n  line-height: 1.5;\n}\n\n.er-code {\n  font-family: var(--er-font-mono);\n  font-size: 0.78rem;\n  color: var(--er-text-1);\n  background: var(--er-bg-canvas);\n  border: var(--er-b-default);\n  border-radius: var(--er-r-ctrl);\n  padding: 0.75rem 1rem;\n}\n\n.er-caption {\n  font-family: var(--er-font-mono);\n  font-size: var(--er-fs-caption);\n  color: var(--er-text-3);\n}\n\n/* ── Cards ───────────────────────────────────────────────── */\n.er-card {\n  background: var(--er-grad-card);\n  border: var(--er-b-default);\n  border-radius: var(--er-r-card);\n  padding: 1rem 1.25rem;\n  transition: border-color var(--er-dur-base) var(--er-ease);\n}\n.er-card:hover { border-color: var(--er-tint-30); }\n\n/* ── Buttons ─────────────────────────────────────────────── */\n.er-btn {\n  font-family: var(--er-font-mono);\n  font-weight: 500;\n  font-size: var(--er-fs-body);\n  letter-spacing: 0.04em;\n  border-radius: var(--er-r-ctrl);\n  padding: 0.5rem 1.5rem;\n  border: var(--er-b-default);\n  background: transparent;\n  color: var(--er-text-1);\n  cursor: pointer;\n  transition: all var(--er-dur-base) var(--er-ease);\n}\n.er-btn:hover {\n  border-color: var(--er-primary);\n  color: var(--er-primary);\n  background: var(--er-tint-06);\n}\n.er-btn--primary {\n  background: var(--er-grad-primary);\n  color: var(--er-bg-deep);\n  font-weight: 600;\n  border: none;\n  text-shadow: 0 1px 0 rgba(0,0,0,0.1);\n}\n.er-btn--primary:hover {\n  background: var(--er-grad-primary-hover);\n  box-shadow: var(--er-glow);\n  transform: translateY(-1px);\n}\n\n/* ── Inputs ──────────────────────────────────────────────── */\n.er-input {\n  font-family: var(--er-font-mono);\n  font-size: var(--er-fs-body);\n  background: var(--er-bg-canvas);\n  border: var(--er-b-default);\n  border-radius: var(--er-r-ctrl);\n  color: var(--er-text-1);\n  padding: 0.5rem 0.75rem;\n  width: 100%;\n}\n.er-input:focus {\n  outline: none;\n  border-color: var(--er-primary);\n  box-shadow: 0 0 0 1px rgba(0, 212, 170, 0.2);\n}\n\n/* ── Chip / badge ────────────────────────────────────────── */\n.er-chip {\n  display: inline-block;\n  padding: 2px 10px;\n  border-radius: var(--er-r-chip);\n  font-family: var(--er-font-mono);\n  font-size: var(--er-fs-label);\n  font-weight: 500;\n  background: var(--er-tint-12);\n  border: 1px solid var(--er-tint-30);\n  color: var(--er-primary);\n}\n.er-chip--green { background: rgba(34,197,94,0.12); border-color: rgba(34,197,94,0.3); color: var(--er-green); }\n.er-chip--amber { background: rgba(245,158,11,0.12); border-color: rgba(245,158,11,0.3); color: var(--er-amber); }\n.er-chip--red   { background: rgba(239,68,68,0.12); border-color: rgba(239,68,68,0.3); color: var(--er-red); }\n\n/* ── Alert boxes ─────────────────────────────────────────── */\n.er-alert {\n  font-family: var(--er-font-mono);\n  font-size: var(--er-fs-body);\n  border-radius: var(--er-r-ctrl);\n  padding: 0.6rem 1rem;\n}\n.er-alert--amber { background: rgba(245,158,11,0.08); border: 1px solid rgba(245,158,11,0.25); color: var(--er-amber); }\n.er-alert--red   { background: rgba(239,68,68,0.10); border: 1px solid rgba(239,68,68,0.30); color: var(--er-red); }\n.er-alert--info  { background: rgba(100,116,139,0.08); border: 1px solid rgba(100,116,139,0.20); color: var(--er-text-2); }\n<\u002Fstyle>\n<style>\n  :root {\n    --stage-w: 1280px;\n  }\n  * { box-sizing: border-box; }\n  html, body { margin: 0; padding: 0; background: var(--er-bg-deep); color: var(--er-text-1); font-family: var(--er-font-mono); }\n  body {\n    min-height: 100vh;\n    background-image:\n      radial-gradient(ellipse at 50% 0%, rgba(0, 212, 170, 0.06), transparent 60%),\n      linear-gradient(rgba(0, 212, 170, 0.02) 1px, transparent 1px),\n      linear-gradient(90deg, rgba(0, 212, 170, 0.02) 1px, transparent 1px);\n    background-size: 100% 100%, 40px 40px, 40px 40px;\n  }\n\n  /* ── Header ───────────────────────────────────── */\n  header {\n    max-width: 1440px; margin: 0 auto; padding: 28px 40px 12px;\n    display: flex; justify-content: space-between; align-items: flex-end;\n    border-bottom: 1px solid var(--er-surface-2);\n  }\n  header .brand {\n    font-family: var(--er-font-display); font-weight: 700; font-size: 22px;\n    color: var(--er-primary); letter-spacing: -0.02em;\n  }\n  header .sub {\n    font-size: 10.5px; color: var(--er-text-5); margin-top: 2px;\n    letter-spacing: 0.08em; text-transform: uppercase;\n  }\n  header h1 {\n    font-family: var(--er-font-display); font-weight: 600; font-size: 13px;\n    color: var(--er-text-2); text-transform: uppercase; letter-spacing: 0.12em;\n    margin: 0;\n  }\n  header .meta {\n    font-size: 10.5px; color: var(--er-text-4);\n    letter-spacing: 0.08em; text-transform: uppercase;\n  }\n  header .live {\n    display: inline-flex; align-items: center; gap: 6px;\n    color: var(--er-primary);\n  }\n  header .live::before {\n    content: ''; width: 6px; height: 6px; border-radius: 50%;\n    background: var(--er-primary);\n    box-shadow: 0 0 8px var(--er-primary);\n    animation: pulse 2s infinite;\n  }\n  @keyframes pulse {\n    0%, 100% { opacity: 1; }\n    50% { opacity: 0.3; }\n  }\n\n  /* ── Legend / control bar ─────────────────────── */\n  .controls {\n    max-width: 1440px; margin: 0 auto; padding: 14px 40px;\n    display: flex; gap: 24px; align-items: center; flex-wrap: wrap;\n    font-size: 11px; letter-spacing: 0.05em;\n  }\n  .legend { display: flex; gap: 18px; color: var(--er-text-3); text-transform: uppercase; }\n  .legend-item { display: flex; gap: 6px; align-items: center; }\n  .legend-dot { width: 10px; height: 10px; border-radius: 2px; display: inline-block; }\n  .legend-dot.source { background: rgba(139, 92, 246, 0.6); border: 1px solid #8B5CF6; }\n  .legend-dot.stage { background: rgba(0, 212, 170, 0.2); border: 1px solid var(--er-primary); }\n  .legend-dot.gate { background: rgba(245, 158, 11, 0.2); border: 1px solid var(--er-amber); }\n  .legend-dot.action { background: rgba(34, 197, 94, 0.2); border: 1px solid var(--er-green); }\n\n  .controls .actions { margin-left: auto; display: flex; gap: 10px; }\n  .btn {\n    font-family: var(--er-font-mono); font-weight: 500; font-size: 11px;\n    letter-spacing: 0.06em; padding: 7px 14px; border-radius: 4px;\n    border: 1px solid var(--er-surface-3); background: transparent;\n    color: var(--er-text-2); cursor: pointer; transition: all 0.2s;\n    text-transform: uppercase;\n  }\n  .btn:hover { border-color: var(--er-primary); color: var(--er-primary); background: rgba(0, 212, 170, 0.05); }\n  .btn.on { border-color: var(--er-primary); color: var(--er-primary); background: rgba(0, 212, 170, 0.08); }\n\n  /* ── Stage container ──────────────────────────── */\n  .diagram-wrap {\n    max-width: 1440px; margin: 20px auto 60px; padding: 0 40px;\n  }\n  .stage {\n    position: relative;\n    width: 100%;\n    aspect-ratio: 1440 / 1000;\n    background:\n      radial-gradient(circle at 50% 50%, rgba(0, 212, 170, 0.025), transparent 70%);\n    border: 1px solid var(--er-surface-2);\n    border-radius: 10px;\n    overflow: hidden;\n  }\n\n  /* Radar rings */\n  .stage svg.rings {\n    position: absolute; inset: 0; width: 100%; height: 100%;\n    pointer-events: none;\n  }\n\n  /* Scan line sweep */\n  .scan-line {\n    position: absolute;\n    left: 50%; top: 50%;\n    width: 50%; height: 2px;\n    transform-origin: 0% 50%;\n    background: linear-gradient(90deg, transparent, rgba(0, 212, 170, 0.5), transparent);\n    animation: sweep 8s linear infinite;\n    pointer-events: none;\n    opacity: 0.7;\n  }\n  @keyframes sweep {\n    from { transform: rotate(0deg); }\n    to { transform: rotate
