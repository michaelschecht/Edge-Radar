# ─────────────────────────────────────────────────────────────────────────────
# Edge-Radar — Streamlit Cloud Secrets Template
# ─────────────────────────────────────────────────────────────────────────────
#
# Paste this into: Streamlit Cloud > App Settings > Secrets
#
# TOML rules to remember:
#   - Strings must be quoted: key = "value"
#   - Multi-line strings use triple quotes: key = """..."""
#   - Sections use [brackets]
#   - Comments start with #
#   - No trailing commas
#   - No spaces in section names
# ─────────────────────────────────────────────────────────────────────────────


# === LOGIN GATE ===
# The webapp password gate reads from this section.
# If omitted, the login screen is bypassed (app is open to anyone).

[passwords]
user = "REPLACE_WITH_YOUR_PASSWORD"


# === KALSHI API ===
# Required for all scan, execute, portfolio, and settle operations.
# Get your API key and generate an RSA key pair at: kalshi.com > Settings > API

[kalshi]
api_key = "REPLACE_WITH_YOUR_KALSHI_API_KEY"
base_url = "https://api.elections.kalshi.com/trade-api/v2"

# Paste the FULL contents of your .pem private key file below.
# Include the BEGIN and END lines. No extra blank lines before/after.
# To get the contents, run locally:  cat keys/live/kalshi_private.key
private_key = """
-----BEGIN RSA PRIVATE KEY-----
REPLACE_WITH_YOUR_FULL_PEM_KEY_CONTENTS
Line2OfYourKey...
Line3OfYourKey...
-----END RSA PRIVATE KEY-----
"""


# === ODDS API ===
# Required for sports edge detection (compares Kalshi vs sportsbook odds).
# Free tier: 500 requests/month per key. Get keys at: https://the-odds-api.com

[odds]
api_key = "REPLACE_WITH_YOUR_ODDS_API_KEY"

# Optional: multiple keys for rotation (comma-separated, no spaces).
# The system auto-rotates when a key hits its rate limit.
# api_keys = "key1,key2,key3"


# === SYSTEM ===
# Top-level keys (not inside a section) are accessed as st.secrets["KEY"]

DRY_RUN = "true"
